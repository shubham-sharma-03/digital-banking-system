server:
  port: ${PORT:8085}
  address: 0.0.0.0

spring:
  application:
    name: auth-service

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# DISABLE Eureka - it's causing startup crashes on Render free tier
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: ${JWT_SECRET:mybank-super-secret-key-for-jwt-signing-2026}
  expiration: 86400000