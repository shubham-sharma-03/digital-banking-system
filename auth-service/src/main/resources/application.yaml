server:
  port: ${PORT:8085}

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: https://digital-banking-system-production-2f87.up.railway.app/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET}