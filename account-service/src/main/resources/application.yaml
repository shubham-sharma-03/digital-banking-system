server:
  port: 8081

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://localhost:5432/account_db
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

  mvc:
    static-path-pattern: /**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka