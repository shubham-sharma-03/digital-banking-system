server:
  port: 8082

spring:
  application:
    name: loan-service

  datasource:
    url: jdbc:postgresql://postgres:5432/loan_db
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka