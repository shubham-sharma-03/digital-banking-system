server:
  port: 9091

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: account-service
              uri: http://localhost:8081
              predicates:
                - Path=/accounts/**

            - id: loan-service
              uri: http://localhost:8082
              predicates:
                - Path=/loans/**

            - id: card-service
              uri: http://localhost:8083
              predicates:
                - Path=/cards/**

            - id: transaction-service
              uri: http://localhost:8084
              predicates:
                - Path=/transactions/**

            - id: auth-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/