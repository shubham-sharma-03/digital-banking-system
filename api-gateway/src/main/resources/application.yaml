server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: account-service
              uri: http://account-service:8081
              predicates:
                - Path=/accounts/**

            - id: loan-service
              uri: http://loan-service:8082
              predicates:
                - Path=/loans/**

            - id: card-service
              uri: http://card-service:8083
              predicates:
                - Path=/cards/**

            - id: transaction-service
              uri: http://transaction-service:8084
              predicates:
                - Path=/transactions/**

            - id: auth-service
              uri: http://auth-service:8085
              predicates:
                - Path=/api/auth/**

            - id: email-service
              uri: http://email-service:8086
              predicates:
              - Path=/email/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    hostname: api-gateway
    prefer-ip-address: false

